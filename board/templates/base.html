
{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}52P{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="{% static 'base.css' %}">
</head>
<body class="{% block body_class %}{% endblock %}">

<header class="site-header">
    <div class="container header-row">

        <div class="header-logo">
            <a href="/" class="logo-link">
                52<span class="logo-p">P</span>
            </a>
        </div>

        <div class="header-search">
            {% block header_search %}
            <form method="get" action="{% url 'ads_list' %}" class="search-form">
                <input
                    type="text"
                    name="q"
                    value="{{ q|default:'' }}"
                    placeholder="Поиск объявлений..."
                    class="search-input"
                >
                <button type="submit" class="search-btn">Найти</button>
            </form>
            {% endblock %}
        </div>

        <nav class="header-nav">
            {% if user.is_authenticated %}
                <a href="{% url 'ads_list' %}" class="nav-link">Лента</a>
                <a href="{% url 'create_ad' %}" class="main-btn">+ Объявление</a>
                <a href="{% url 'profile' %}" class="nav-user">{{ user.username }}</a>

                <form method="post" action="{% url 'logout' %}" class="nav-logout">
                    {% csrf_token %}
                    <button type="submit" class="link-btn">Выйти</button>
                </form>
            {% else %}
                <a href="{% url 'ads_list' %}" class="nav-link">Лента</a>
                <a href="{% url 'login' %}" class="nav-link">Вход</a>
                <a href="{% url 'signup' %}" class="nav-link">Регистрация</a>
            {% endif %}
        </nav>

    </div>
</header>

<main class="page">
    {% block content %}{% endblock %}
</main>

</body>
</html>
